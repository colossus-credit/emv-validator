name: Deploy Base Sepolia

on:
  release:
    types: [published]

env:
  FOUNDRY_PROFILE: ci

jobs:
  deploy:
    name: Deploy and verify
    runs-on: ubuntu-latest
    environment: base-sepolia
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Show Forge version
        run: forge --version

      - name: Run Forge build
        run: forge build --sizes

      - name: Run Forge tests
        run: forge test -vvv

      - name: Deploy and verify contracts
        env:
          BASE_SEPOLIA_RPC_URL: ${{ secrets.BASE_SEPOLIA_RPC_URL }}
          DEPLOYER_PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          BASESCAN_API_KEY: ${{ secrets.BASESCAN_API_KEY }}
          TOKEN_DECIMALS: ${{ vars.BASE_SEPOLIA_TOKEN_DECIMALS }}
          INITIAL_TOKEN_SUPPLY: ${{ vars.BASE_SEPOLIA_INITIAL_TOKEN_SUPPLY }}
        run: |
          : "${BASE_SEPOLIA_RPC_URL:?Missing BASE_SEPOLIA_RPC_URL secret}"
          : "${DEPLOYER_PRIVATE_KEY:?Missing DEPLOYER_PRIVATE_KEY secret}"
          : "${BASESCAN_API_KEY:?Missing BASESCAN_API_KEY secret}"
          export TOKEN_DECIMALS="${TOKEN_DECIMALS:-6}"
          export INITIAL_TOKEN_SUPPLY="${INITIAL_TOKEN_SUPPLY:-0}"

          # Prevent BaseScan from remapping local src/* contracts into lib/kernel/src/*.
          grep -v '^src/=lib/kernel/src/$' remappings.txt > remappings.deploy.txt
          mv remappings.deploy.txt remappings.txt
          forge clean

          forge script script/DeployBaseSepolia.s.sol:DeployBaseSepolia \
            --rpc-url "$BASE_SEPOLIA_RPC_URL" \
            --broadcast \
            --verify \
            --verifier etherscan \
            --etherscan-api-key "$BASESCAN_API_KEY" \
            --chain 84532 \
            --slow \
            -vvvv

      - name: Export deployment addresses
        env:
          DEPLOYER_PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
        run: |
          : "${DEPLOYER_PRIVATE_KEY:?Missing DEPLOYER_PRIVATE_KEY secret}"
          run_json="broadcast/DeployBaseSepolia.s.sol/84532/run-latest.json"
          test -f "$run_json"

          extract_address() {
            jq -er --arg contract "$1" \
              '[.transactions[]
                | select(.transactionType == "CREATE" and .contractName == $contract)
                | .contractAddress] | last // empty' \
              "$run_json"
          }

          deployer_address="$(cast wallet address --private-key "$DEPLOYER_PRIVATE_KEY")"
          token_address="$(extract_address ColossusTestToken)"
          acquirer_config_address="$(extract_address AcquirerConfig)"
          emv_settlement_address="$(extract_address EMVSettlement)"
          emv_validator_address="$(extract_address EMVValidator)"

          {
            echo "DEPLOYER_ADDRESS=$deployer_address"
            echo "TOKEN_ADDRESS=$token_address"
            echo "ACQUIRER_CONFIG_ADDRESS=$acquirer_config_address"
            echo "EMV_SETTLEMENT_ADDRESS=$emv_settlement_address"
            echo "EMV_VALIDATOR_ADDRESS=$emv_validator_address"
          } >> "$GITHUB_ENV"

      - name: Smoke test deployed contracts
        id: smoke
        env:
          BASE_SEPOLIA_RPC_URL: ${{ secrets.BASE_SEPOLIA_RPC_URL }}
          TOKEN_DECIMALS: ${{ vars.BASE_SEPOLIA_TOKEN_DECIMALS }}
          INITIAL_TOKEN_SUPPLY: ${{ vars.BASE_SEPOLIA_INITIAL_TOKEN_SUPPLY }}
        run: |
          : "${BASE_SEPOLIA_RPC_URL:?Missing BASE_SEPOLIA_RPC_URL secret}"
          : "${DEPLOYER_ADDRESS:?Missing DEPLOYER_ADDRESS from deployment export}"
          : "${TOKEN_ADDRESS:?Missing TOKEN_ADDRESS from deployment broadcast}"
          : "${ACQUIRER_CONFIG_ADDRESS:?Missing ACQUIRER_CONFIG_ADDRESS from deployment broadcast}"
          : "${EMV_SETTLEMENT_ADDRESS:?Missing EMV_SETTLEMENT_ADDRESS from deployment broadcast}"
          : "${EMV_VALIDATOR_ADDRESS:?Missing EMV_VALIDATOR_ADDRESS from deployment broadcast}"

          export TOKEN_DECIMALS="${TOKEN_DECIMALS:-6}"
          export INITIAL_TOKEN_SUPPLY="${INITIAL_TOKEN_SUPPLY:-0}"

          forge script script/SmokeBaseSepolia.s.sol:SmokeBaseSepolia \
            --rpc-url "$BASE_SEPOLIA_RPC_URL" \
            --chain 84532 \
            -vvvv

      - name: Build deployment summary
        if: always()
        run: |
          run_json="broadcast/DeployBaseSepolia.s.sol/84532/run-latest.json"
          test -f "$run_json"

          cat > deployment-summary.md <<'EOF'
          ## Base Sepolia Deployment

          | Contract | Address | BaseScan |
          | --- | --- | --- |
          EOF

          jq -r '.transactions[] | select(.transactionType == "CREATE") | [.contractName, .contractAddress] | @tsv' "$run_json" \
            | while IFS=$'\t' read -r contract address; do
                echo "| \`$contract\` | \`$address\` | [view](https://sepolia.basescan.org/address/$address) |" \
                  >> deployment-summary.md
              done

          {
            echo ""
            echo "- Network: Base Sepolia"
            echo "- Chain ID: \`84532\`"
            echo "- Release: \`${{ github.event.release.tag_name }}\`"
            echo "- Commit: \`${{ github.sha }}\`"
            echo "- Smoke test: \`${{ steps.smoke.outcome }}\`"
          } >> deployment-summary.md

      - name: Write deployment summary to release
        if: ${{ always() && hashFiles('deployment-summary.md') != '' }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");

            const startMarker = "<!-- base-sepolia-deployment:start -->";
            const endMarker = "<!-- base-sepolia-deployment:end -->";
            const summary = fs.readFileSync("deployment-summary.md", "utf8").trim();
            const section = `${startMarker}\n${summary}\n${endMarker}`;

            const { owner, repo } = context.repo;
            const release_id = context.payload.release.id;
            const { data: release } = await github.rest.repos.getRelease({ owner, repo, release_id });
            const body = release.body || "";
            const pattern = new RegExp(`${startMarker}[\\s\\S]*?${endMarker}`);
            const nextBody = pattern.test(body)
              ? body.replace(pattern, section)
              : [body.trim(), section].filter(Boolean).join("\n\n");

            await github.rest.repos.updateRelease({
              owner,
              repo,
              release_id,
              body: nextBody,
            });
